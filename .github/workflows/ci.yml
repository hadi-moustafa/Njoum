name: CI

on:
  push:
    branches: [main, Development]
  pull_request:
    branches: [main]

jobs:
  # ── API: lint → typecheck → test ──────────────────────────────
  api:
    name: API (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test + coverage
        run: pnpm jest --coverage --ci
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET || 'test-secret-at-least-32-characters-long' }}
          ENCRYPTION_KEY:      ${{ secrets.ENCRYPTION_KEY      || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          SUPABASE_URL:        https://placeholder.supabase.co
          SUPABASE_ANON_KEY:   placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder

  # ── Web: typecheck → build ─────────────────────────────────────
  web:
    name: Web admin (typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL:      https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL:           http://localhost:3001/api/v1
          API_URL:                       http://localhost:3001/api/v1

  # ── Mobile: typecheck ─────────────────────────────────────────
  mobile:
    name: Mobile (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Typecheck
        run: pnpm exec tsc --noEmit
